<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твій ідеальний сорт Underwood 🍻</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">

        <!-- 1. ЕКРАН СТАРТУ -->
        <div id="start-screen" class="screen">
            <h1>Яке ти пиво від Underwood сьогодні? 🍺</h1>
            <p>Пройди короткий тест із 10 питань і дізнайся, який сорт ідеально пасує твоєму настрою!</p>
            <button id="start-btn" class="main-btn">Почати тест</button>
        </div>

        <!-- 2. ЕКРАН ТЕСТУ (ПИТАННЯ) -->
        <div id="quiz-screen" class="screen hidden">
            <h2 id="question-title">Завантаження питання...</h2>
            <div id="answers-container" class="answers-grid">
                <!-- Кнопки відповідей генерируются через script.js -->
            </div>
        </div>

        <!-- 3. ЕКРАН РЕЗУЛЬТАТУ -->
        <div id="result-screen" class="screen hidden">
            <h2 id="result-title">Твій результат</h2>
            <p id="result-desc">Опис сорту...</p>
            <button id="restart-btn" class="main-btn">Пройти ще раз 🔄</button>
        </div>

    </div>

    <!-- Підключаємо оновлений script.js -->
    <script src="script.js"></script>
</body>
</html>
